services:
  agent-service:
    build:
      context: ./agent-service
      dockerfile: Dockerfile
    container_name: kopilkin-agent-service
    ports:
      - "8004:8004"
    environment:
      OLLAMA_URL: "http://host.docker.internal:11434"
      OLLAMA_HOST: "http://host.docker.internal:11434"
      TRANSACTION_SERVICE_URL: "http://host.docker.internal:8002"
      QDRANT_HOST: "qdrant"
      QDRANT_PORT: "6333"

      LANGFUSE_PUBLIC_KEY: "pk-lf-8e68e5a6-89f8-49f4-b08c-8b04167ea257"
      LANGFUSE_SECRET_KEY: "sk-lf-7f08364b-673e-4c8f-9825-3699ca37c805"
      LANGFUSE_HOST: "http://langfuse:3000"
      LANGFUSE_BASE_URL: "http://langfuse:3000"
    depends_on:
      qdrant:
        condition: service_started
      langfuse:
        condition: service_started
    restart: unless-stopped

  auth-service:
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    container_name: kopilkin-auth-service
    ports:
      - "8001:8001"
    environment:
      AUTH_DATABASE_URL: "postgresql://kopilkin:kopilkin_password@postgres:5432/auth_db"
      KAFKA_BOOTSTRAP_SERVERS: "kafka:9092"
      REDIS_URL: "redis://redis:6379/0"
      JWT_SECRET_KEY: "kopilkin-local-dev-secret-change-me"
      JWT_ALGORITHM: "HS256"
      ACCESS_TOKEN_EXPIRE_MINUTES: "60"
      MINIO_ENDPOINT: "minio:9000"
      MINIO_ACCESS_KEY: "kopilkin"
      MINIO_SECRET_KEY: "kopilkin_minio_password"
      MINIO_BUCKET: "kopilkin-files"
      MINIO_PUBLIC_URL: "http://localhost:9000/kopilkin-files"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
      redis:
        condition: service_started
      minio:
        condition: service_started
    restart: unless-stopped

  transaction-service:
    build:
      context: ./transaction-service
      dockerfile: Dockerfile
    container_name: kopilkin-transaction-service
    ports:
      - "8002:8002"
    environment:
      TRANSACTION_DATABASE_URL: "postgresql://kopilkin:kopilkin_password@postgres:5432/transaction_db"
      KAFKA_BOOTSTRAP_SERVERS: "kafka:9092"
      REDIS_URL: "redis://redis:6379/0"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
      redis:
        condition: service_started
    restart: unless-stopped

  savings-service:
    build:
      context: ./savings-service
      dockerfile: Dockerfile
    container_name: kopilkin-savings-service
    ports:
      - "8003:8003"
    environment:
      SAVINGS_DATABASE_URL: "postgresql://kopilkin:kopilkin_password@postgres:5432/savings_db"
      KAFKA_BOOTSTRAP_SERVERS: "kafka:9092"
      MINIO_ENDPOINT: "minio:9000"
      MINIO_ACCESS_KEY: "kopilkin"
      MINIO_SECRET_KEY: "kopilkin_minio_password"
      MINIO_BUCKET: "kopilkin-files"
      MINIO_PUBLIC_URL: "http://localhost:9000/kopilkin-files"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
      minio:
        condition: service_started
    restart: unless-stopped

  kafka:
    image: apache/kafka:3.8.0
    container_name: kopilkin-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: "1"
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"

      KAFKA_LISTENERS: "PLAINTEXT://:9092,CONTROLLER://:9093"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT"

      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: "0"

      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
    volumes:
      - kafka_data:/var/lib/kafka/data
    restart: unless-stopped

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kopilkin-kafka-ui
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: "kopilkin-local"
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: "kafka:9092"
    depends_on:
      - kafka
    restart: unless-stopped

  redis:
    image: redis:7
    container_name: kopilkin-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  postgres:
    image: postgres:16
    container_name: kopilkin-postgres
    environment:
      POSTGRES_USER: "kopilkin"
      POSTGRES_PASSWORD: "kopilkin_password"
      POSTGRES_DB: "kopilkin_main"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kopilkin -d kopilkin_main"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    container_name: kopilkin-qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  langfuse:
    image: langfuse/langfuse:2
    container_name: kopilkin-langfuse
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: "postgresql://langfuse:langfuse@langfuse-db:5432/langfuse"
      NEXTAUTH_SECRET: "kopilkin-nextauth-secret-local-dev-123456789"
      SALT: "kopilkin-salt-local-dev-123456789"
      NEXTAUTH_URL: "http://localhost:3000"
      TELEMETRY_ENABLED: "false"
      LANGFUSE_ENABLE_EXPERIMENTAL_FEATURES: "false"
    depends_on:
      langfuse-db:
        condition: service_healthy
    restart: unless-stopped

  langfuse-db:
    image: postgres:15
    container_name: kopilkin-langfuse-db
    environment:
      POSTGRES_USER: "langfuse"
      POSTGRES_PASSWORD: "langfuse"
      POSTGRES_DB: "langfuse"
    volumes:
      - langfuse_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U langfuse -d langfuse"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  recsys-service:
    build:
      context: ./recsys-service
      dockerfile: Dockerfile
    container_name: kopilkin-recsys-service
    ports:
      - "8005:8005"
    environment:
      TRANSACTION_SERVICE_URL: "http://transaction-service:8002"
      KAFKA_BOOTSTRAP_SERVERS: "kafka:9092"
    depends_on:
      transaction-service:
        condition: service_started
      kafka:
        condition: service_started
    restart: unless-stopped

  api-gateway-1:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    image: kopilkin-api-gateway:local
    container_name: kopilkin-api-gateway-1
    expose:
      - "8000"
    environment:
      INSTANCE_NAME: "api-gateway-1"
      AUTH_SERVICE_URL: "http://auth-service:8001"
      TRANSACTION_SERVICE_URL: "http://transaction-service:8002"
      SAVINGS_SERVICE_URL: "http://savings-service:8003"
      AGENT_SERVICE_URL: "http://agent-service:8004"
      RECSYS_SERVICE_URL: "http://recsys-service:8005"
      REDIS_URL: "redis://redis:6379/0"
      RATE_LIMIT_PER_MINUTE: "60"
    depends_on:
      auth-service:
        condition: service_started
      transaction-service:
        condition: service_started
      savings-service:
        condition: service_started
      recsys-service:
        condition: service_started
      redis:
        condition: service_started
    restart: unless-stopped

  api-gateway-2:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    image: kopilkin-api-gateway:local
    container_name: kopilkin-api-gateway-2
    expose:
      - "8000"
    environment:
      INSTANCE_NAME: "api-gateway-2"
      AUTH_SERVICE_URL: "http://auth-service:8001"
      TRANSACTION_SERVICE_URL: "http://transaction-service:8002"
      SAVINGS_SERVICE_URL: "http://savings-service:8003"
      AGENT_SERVICE_URL: "http://agent-service:8004"
      RECSYS_SERVICE_URL: "http://recsys-service:8005"
      REDIS_URL: "redis://redis:6379/0"
      RATE_LIMIT_PER_MINUTE: "60"
    depends_on:
      auth-service:
        condition: service_started
      transaction-service:
        condition: service_started
      savings-service:
        condition: service_started
      recsys-service:
        condition: service_started
      redis:
        condition: service_started
    restart: unless-stopped

  nginx-balancer:
    image: nginx:latest
    container_name: kopilkin-nginx-balancer
    ports:
      - "8088:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      api-gateway-1:
        condition: service_started
      api-gateway-2:
        condition: service_started
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: kopilkin-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: "kopilkin"
      MINIO_ROOT_PASSWORD: "kopilkin_minio_password"
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    restart: unless-stopped

volumes:
  qdrant_data:
  langfuse_db_data:
  postgres_data:
  kafka_data:
  redis_data:
  minio_data: