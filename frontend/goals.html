<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kopilkin - Goals</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="app-bg">
  <div class="mobile-shell">
    <header class="topbar">
      <div>
        <div class="small-label">Savings management</div>
        <h1 class="page-title">Goals</h1>
      </div>
      <div class="avatar-circle">H</div>
    </header>

    <section class="card">
      <h2 class="section-title">Create new goal</h2>
      <form id="goalForm" class="form-block">
        <input type="text" id="goalTitle" placeholder="Goal title" required />
        <input type="number" step="0.01" min="0.01" id="goalTargetAmount" placeholder="Target amount" required />
        <button type="submit" class="primary-btn">Add new goal</button>
      </form>
      <p id="goalMessage" class="message-text"></p>
    </section>

    <section class="card">
      <div class="section-row">
        <h2 class="section-title">Your goals</h2>
        <button id="refreshGoalsBtn" class="text-btn">Refresh</button>
      </div>
      <div id="goalsList" class="goals-list">
        <p class="muted-text">No goals yet.</p>
      </div>
    </section>

    <nav class="bottom-nav">
      <a href="home.html" class="nav-item">Home</a>
      <a href="goals.html" class="nav-item active-nav">Goals</a>
      <a href="ai.html" class="nav-item ai-nav-btn">AI</a>
      <a href="profile.html" class="nav-item">Profile</a>
      <a href="#" class="nav-item" id="logoutBtn">Logout</a>
    </nav>
  </div>

  <script src="app.js"></script>
  <script>
    setupGoalsPage();
  </script>
</body>
</html>
