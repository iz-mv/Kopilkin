<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kopilkin - Home</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="app-bg">
  <div class="mobile-shell">
    <header class="topbar">
      <div>
        <div class="small-label">Welcome back</div>
        <h1 class="page-title">Kopilkin</h1>
      </div>
      <div class="avatar-circle">H</div>
    </header>

    <section class="summary-grid">
      <div class="card summary-card">
        <div class="small-label">Today spent</div>
        <div class="big-number" id="todaySpent">0 ₽</div>
      </div>
      <div class="card summary-card">
        <div class="small-label">Total income</div>
        <div class="big-number" id="totalIncome">0 ₽</div>
      </div>
      <div class="card summary-card full-width">
        <div class="small-label">Suggested to save today</div>
        <div class="big-number accent-number" id="suggestedSave">0 ₽</div>
      </div>
    </section>

    <section class="card quick-add-card">
      <div class="section-row">
        <h2 class="section-title">Quick add expense</h2>
      </div>

      <form id="transactionForm" class="form-block compact-form">
        <input type="number" step="0.01" id="txAmount" placeholder="Amount" required />

        <div class="chip-group">
          <button type="button" class="chip active-chip" data-category="Restaurants">Restaurants</button>
          <button type="button" class="chip" data-category="Transport">Transport</button>
          <button type="button" class="chip" data-category="Shopping">Shopping</button>
          <button type="button" class="chip" data-category="Groceries">Groceries</button>
          <button type="button" class="chip" data-category="Other">Other</button>
        </div>

        <input type="date" id="txDate" required />
        <select id="txType">
          <option value="expense">Expense</option>
          <option value="income">Income</option>
        </select>
        <input type="text" id="txDescription" placeholder="Note (optional)" />

        <button type="submit" class="primary-btn">Save transaction</button>
      </form>

      <p id="transactionMessage" class="message-text"></p>
    </section>

    <section class="card">
      <div class="section-row">
        <h2 class="section-title">Recent transactions</h2>
        <button id="refreshTransactionsBtn" class="text-btn">Refresh</button>
      </div>
      <div id="transactionsList" class="transactions-list">
        <p class="muted-text">No transactions yet.</p>
      </div>
    </section>

    <nav class="bottom-nav">
      <a href="home.html" class="nav-item active-nav">Home</a>
      <a href="goals.html" class="nav-item">Goals</a>
      <a href="profile.html" class="nav-item">Profile</a>
      <a href="#" class="nav-item" id="logoutBtn">Logout</a>
    </nav>
  </div>

  <script src="app.js"></script>
  <script>
    setupHomePage();
  </script>
</body>
</html>
